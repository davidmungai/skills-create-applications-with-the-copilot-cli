name: Step 4 # Last step of the exercise

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    types:
      - closed

permissions:
  contents: write
  actions: write
  issues: write

env:
  REVIEW_FILE: ".github/steps/x-review.md"

jobs:
  find_exercise:
    name: Find Exercise Issue
    uses: skills/exercise-toolkit/.github/workflows/find-exercise-issue.yml@v0.8.1

  check_step_work:
    name: Check step work
    runs-on: ubuntu-latest
    needs: [find_exercise]
    env:
      ISSUE_REPOSITORY: ${{ github.repository }}
      ISSUE_NUMBER: ${{ needs.find_exercise.outputs.issue-number }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Get response templates
        uses: actions/checkout@v5
        with:
          repository: skills/exercise-toolkit
          path: exercise-toolkit
          ref: v0.8.1

      - name: Find last comment
        id: find-last-comment
        uses: peter-evans/find-comment@v3
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          direction: last

      - name: Update comment - checking work
        uses: GrantBirki/comment@v2.1.1
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          comment-id: ${{ steps.find-last-comment.outputs.comment-id }}
          file: exercise-toolkit/markdown-templates/step-feedback/checking-work.md
          edit-mode: replace

      - name: Create missing feature request issue if needed
        run: |
          ISSUE_COUNT=$(gh issue list --repo ${{ github.repository }} --state all --json number --jq 'length')
          echo "Current issue count: $ISSUE_COUNT"
          if [ "$ISSUE_COUNT" -lt 3 ]; then
            echo "Creating missing feature request issue for extended calculator operations..."
            gh issue create \
              --repo "${{ github.repository }}" \
              --title "Feature Request: Calculator extended operations - modulo, power, and square root" \
              --body "## Feature Description

Add extended arithmetic operations to the Node.js CLI calculator app to support more complex calculations beyond the four basic operations.

## Use Case

Users need to perform more advanced calculations from the command line, including remainder operations, exponentiation, and square root calculations without leaving the terminal.

## Proposed Solution

Add the following functions to \`calculator.js\`:

1. \`modulo(a, b)\` - returns the remainder of \`a\` divided by \`b\`, with error handling for division by zero
2. \`power(base, exponent)\` - returns \`base\` raised to the power of \`exponent\`
3. \`squareRoot(n)\` - returns the square root of \`n\`, with error handling for negative numbers

Operator aliases to support:
- modulo: \`%\`, \`mod\`, \`modulo\`
- power: \`^\`, \`**\`, \`power\`
- square root: \`sqrt\`, \`squareRoot\`, \`√\`

## Additional Context

These operations extend the calculator implemented in \`calculator.js\` to make it more versatile for everyday calculations." \
              --label "enhancement"
            echo "Issue created successfully."
          else
            echo "Already have $ISSUE_COUNT issues. No issue creation needed."
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if at least 3 issues exist
        id: check-issue-count
        continue-on-error: true
        run: |
          ISSUE_COUNT=$(gh issue list --repo ${{ github.repository }} --state all --json number --jq 'length')
          echo "Found $ISSUE_COUNT issues"
          if [ "$ISSUE_COUNT" -ge 3 ]; then
            echo "At least 3 issues exist"
            exit 0
          else
            echo "Less than 3 issues exist"
            exit 1
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update comment - step results
        uses: GrantBirki/comment@v2.1.1
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          comment-id: ${{ steps.find-last-comment.outputs.comment-id }}
          edit-mode: replace
          file: exercise-toolkit/markdown-templates/step-feedback/step-results-table.md
          vars: |
            step_number: 4
            results_table:
              - description: "At least 3 issues exist in repository"
                passed: ${{ steps.check-issue-count.outcome == 'success' }}

      - name: Fail job if not all checks passed
        if: contains(steps.*.outcome, 'failure')
        run: exit 1

  post_review_content:
    name: Post review content
    needs: [find_exercise, check_step_work]
    runs-on: ubuntu-latest
    env:
      ISSUE_REPOSITORY: ${{ github.repository }}
      ISSUE_NUMBER: ${{ needs.find_exercise.outputs.issue-number }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Get response templates
        uses: actions/checkout@v5
        with:
          repository: skills/exercise-toolkit
          path: exercise-toolkit
          ref: v0.8.1

      - name: Create comment - step finished - final review next
        uses: GrantBirki/comment@v2.1.1
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          file: exercise-toolkit/markdown-templates/step-feedback/lesson-review.md

      - name: Create comment - add review content
        uses: GrantBirki/comment@v2.1.1
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          file: ${{ env.REVIEW_FILE }}

      - name: Disable current workflow
        run: gh workflow disable "${{github.workflow}}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  finish_exercise:
    name: Finish Exercise
    needs: [find_exercise, post_review_content]
    uses: skills/exercise-toolkit/.github/workflows/finish-exercise.yml@v0.8.1
    with:
      issue-url: ${{ needs.find_exercise.outputs.issue-url }}
      exercise-title: "Create applications with the Copilot CLI"
